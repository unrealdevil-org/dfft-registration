<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFFT Tournament Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --glow-color: #00f2fe;
            --secondary-glow: #4facfe;
            --bg-color: #060913;
            --card-bg: rgba(10, 15, 30, 0.8);
            --text-color: #ffffff;
            --text-muted: #a0aec0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 10% 20%, rgba(0, 242, 254, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(79, 172, 254, 0.05) 0px, transparent 50%);
        }

        /* Top Header & Social Buttons */
        .header-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px var(--glow-color), 0 0 20px var(--secondary-glow);
            letter-spacing: 2px;
        }

        .telegram-btn {
            background: linear-gradient(135deg, #229ED9, #0088cc);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.4);
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 136, 204, 0.8);
        }

        /* Main Wrapper */
        .main-container {
            width: 100%;
            max-width: 800px;
            padding: 0 20px 40px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Hero Title Block */
        .hero-block {
            text-align: center;
            padding: 30px 20px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.05);
            backdrop-filter: blur(10px);
        }

        .hero-block h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #81e6d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-block p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Google Form Iframe Wrapper */
        .form-card {
            background: var(--card-bg);
            border: 2px solid rgba(0, 242, 254, 0.2);
            border-radius: 20px;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.1);
            backdrop-filter: blur(10px);
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s ease;
        }

        .form-card:hover {
            border-color: var(--glow-color);
        }

        /* Glowing Border Animation Top Line */
        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--glow-color), var(--secondary-glow), transparent);
            animation: gow-bar 3s linear infinite;
        }

        @keyframes gow-bar {
            0% { background-position: -800px 0; }
            100% { background-position: 800px 0; }
        }

        /* Google Form Integration styling */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 800px; /* Perfectly adjusted height for the registration form fields */
            overflow: -webkit-paged-y;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Modern Custom Scrollbar for Container */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 254, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--glow-color);
        }

        /* Footer Info & Support */
        .footer-container {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            margin-top: auto;
            background: rgba(4, 7, 15, 0.9);
        }

        .footer-container a {
            color: var(--glow-color);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-container a:hover {
            text-decoration: underline;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .header-container {
                padding: 15px;
            }
            .logo-text {
                font-size: 20px;
            }
            .telegram-btn {
                padding: 8px 14px;
                font-size: 11px;
            }
            .hero-block h1 {
                font-size: 22px;
            }
            .iframe-container {
                height: 850px; /* Generous height for seamless scrolling on mobile */
            }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-text">DFFT ESPORTS</div>
        <a href="https://t.me/+fT0qY634_k0zMGFl" target="_blank" class="telegram-btn">
            <i class="fab fa-telegram-plane"></i> JOIN TELEGRAM
        </a>
    </div>

    <div class="main-container">
        
        <div class="hero-block">
            <h1>Squad Registration Portal</h1>
            <p>Fill out the official Google Form below to lock your slot. Double-check all UIDs & Screenshots before submitting.</p>
        </div>

        <div class="form-card">
            <div class="iframe-container">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfAEZeEM4hiKxer8TXR9mKUkQSHV21KA21aQiaTfJJDG28iaQ/viewform?embedded=true" 
                        defer>
                        Loading Registration Form...
                </iframe>
            </div>
        </div>

    </div>

    <div class="footer-container">
        <p>&copy; 2026 DFFT ESPORTS. All Rights Reserved.</p>
        <p>Facing issues? Contact <a href="https://t.me/+fT0qY634_k0zMGFl" target="_blank">DFFT Support</a></p>
    </div>

</body>
</html>
